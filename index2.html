<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Velange</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Red+Rose:wght@400;600;700&family=Sansita:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- BARRA DE NAVEGACIÓN (Apunta de regreso al index.html) -->
    <nav class="navbar">
        <div class="logo">Velange</div>
        <ul class="nav-links">
            <li><a href="index.html#catalogo">Catálogo</a></li>
            <li><a href="index.html#por-que">Por qué elegirnos?</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
        <div class="cart-icon">
            <i class="fa-solid fa-cart-shopping"></i>
        </div>
    </nav>

    <!-- PÁGINA DE CONTACTO CENTRALIZADA -->
    <div class="contact-page-wrapper">
        <div class="contact-container">
            <div class="section-header" style="margin-bottom: 25px;">
                <h2>Contáctanos</h2>
                <p>Elige cómo prefieres comunicarte con nosotros.</p>
            </div>

            <div class="social-contact">
                <a href="https://instagram.com/TU_USUARIO" target="_blank" class="social-btn instagram-btn">
                    <i class="fa-brands fa-instagram"></i> Instagram
                </a>
                
                <a href="https://tiktok.com/@TU_USUARIO" target="_blank" class="social-btn tiktok-btn">
                    <i class="fa-brands fa-tiktok"></i> TikTok
                </a>

                <a href="https://wa.me/593000000000?text=Hola,%20me%20interesan%20las%20rosas%20eternas%20de%20Velange" target="_blank" class="social-btn whatsapp-btn">
                    <i class="fa-brands fa-whatsapp"></i> WhatsApp
                </a>
            </div>

            <div class="divider">
                <span>O envíanos un correo</span>
            </div>

            <form action="https://formsubmit.co/TU_CORREO@GMAIL.COM" method="POST" class="contact-form">
                <div class="input-group">
                    <input type="text" name="nombre" placeholder="Tu Nombre" required>
                </div>
                <div class="input-group">
                    <input type="email" name="email" placeholder="Tu Correo Electrónico" required>
                </div>
                <div class="input-group">
                    <textarea name="mensaje" rows="4" placeholder="¿En qué podemos ayudarte?" required></textarea>
                </div>
                <input type="hidden" name="_subject" value="¡Nuevo mensaje de Velange!">
                <input type="hidden" name="_captcha" value="false">
                
                <button type="submit" class="submit-btn">Enviar Mensaje</button>
            </form>
        </div>
    </div>

</body>
</html>
